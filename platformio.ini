; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ============================================================
; Gateway Firmware - PlatformIO Configuration
; Target: ESP32-WROOM-32 DevKit
; Framework: Arduino
; ============================================================

[platformio]
name = ESP32 Gateway Firmware
default_envs = gateway_release

; ============================================================
; Shared base configuration
; ============================================================
[env:env_base]
platform = espressif32
board = upesy_wroom
framework = arduino


board_build.flash_mode = dio
board_build.flash_freq = 80m
board_build.f_cpu = 240000000L
board_build.partitions = partitions_custom.csv

board_upload.flash_size = 4MB

; LittleFS filesystem
board_build.filesystem = littlefs

; Build flags shared across all environments
build_flags =
    ; C++ standard
    build_unflags = -std=gnu++11
    build_flags   = -std=gnu++17
    -fno-exceptions
    -fno-rtti

    ; ESP32 core config
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=0

    ; Project identity
    -DFIRMWARE_PROJECT="\"ESP32-Gateway\""
    -DFIRMWARE_VENDOR="\"EmbeddedSystems\""

    ; Stack sizes (bytes)
    -DSTACK_BOOT_MANAGER=4096
    -DSTACK_HEALTH_MONITOR=3072
    -DSTACK_EVENT_BUS=3072
    -DSTACK_LOGGER=2048
    -DSTACK_STATE_MACHINE=2048
    -DSTACK_NETWORK_MANAGER=4096

    ; Task priorities (0=lowest, 24=highest on ESP32)
    -DPRIORITY_BOOT_MANAGER=5
    -DPRIORITY_HEALTH_MONITOR=3
    -DPRIORITY_EVENT_BUS=4
    -DPRIORITY_LOGGER=2
    -DPRIORITY_STATE_MACHINE=4
    -DPRIORITY_NETWORK_MANAGER=4

    ; FreeRTOS tick
    -DCONFIG_FREERTOS_HZ=1000

    ; Security
    -DMBEDTLS_CONFIG_FILE="\"mbedtls_custom_config.h\""

; Libraries shared across all environments
lib_deps =
    ESP Async WebServer@3.3.0
    bblanchon/ArduinoJson@^7.2.0
    ESP32 Arduino NVS@>=1.0.3

lib_ldf_mode = deep+

monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder
    time

upload_speed = 921600

; ============================================================
; Development Environment
; ============================================================
[env:gateway_debug]
extends = env:env_base

build_type = debug

build_flags =
     ${env:env_base.build_flags}
    -DFIRMWARE_BUILD_TYPE="\"debug\""
    -DENABLE_SERIAL_LOGGING=1
    -DLOG_LEVEL_DEFAULT=4
    -DSERIAL_BAUD_RATE=115200
    -DENABLE_HEAP_STATS=1
    -DENABLE_TASK_STATS=1
    -Og
    -ggdb3
    -DDEBUG_ESP_PORT=Serial
    -DCORE_DEBUG_LEVEL=5

; ============================================================
; Release Environment
; ============================================================
[env:gateway_release]
extends = env:env_base

build_type = release

build_flags =
     ${env:env_base.build_flags}
    -DFIRMWARE_BUILD_TYPE="\"release\""
    -DENABLE_SERIAL_LOGGING=0
    -DLOG_LEVEL_DEFAULT=2
    -DSERIAL_BAUD_RATE=115200
    -DENABLE_HEAP_STATS=0
    -DENABLE_TASK_STATS=0
    -O2
    -DNDEBUG

; ============================================================
; CI / Test Environment
; ============================================================
[env:gateway_ci]
extends = env:env_base

build_type = debug

build_flags =
      ${env:env_base.build_flags}
    -DFIRMWARE_BUILD_TYPE="\"ci\""
    -DENABLE_SERIAL_LOGGING=1
    -DLOG_LEVEL_DEFAULT=5
    -DSERIAL_BAUD_RATE=115200
    -DENABLE_HEAP_STATS=1
    -DENABLE_TASK_STATS=1
    -Og
    -ggdb

test_framework = unity