<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">

    <!-- Security meta tags -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self';
                   style-src 'self' 'unsafe-inline';
                   img-src 'self' data:;
                   connect-src 'self';
                   frame-ancestors 'none';">
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <title>Gateway — Login</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body class="auth-page">

    <!-- Login Container -->
    <div class="auth-container" role="main">

        <!-- Logo / Header -->
        <div class="auth-header">
            <div class="auth-logo" aria-hidden="true">
                <svg width="48" height="48" viewBox="0 0 48 48"
                     fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="48" height="48" rx="12"
                          fill="var(--color-primary)"/>
                    <path d="M12 24C12 17.4 17.4 12 24 12C30.6 12 36 17.4 36 24"
                          stroke="white" stroke-width="2.5"
                          stroke-linecap="round"/>
                    <path d="M24 24C24 20.7 21.3 18 18 18"
                          stroke="white" stroke-width="2.5"
                          stroke-linecap="round"/>
                    <circle cx="24" cy="24" r="3" fill="white"/>
                    <path d="M24 27V36" stroke="white"
                          stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </div>
            <h1 class="auth-title">Gateway</h1>
            <p class="auth-subtitle">ESP32 IoT Gateway</p>
        </div>

        <!-- Login Form -->
        <div class="auth-card">
            <form id="loginForm"
                  class="auth-form"
                  novalidate
                  autocomplete="off">

                <!-- Alert area -->
                <div id="loginAlert"
                     class="alert alert--hidden"
                     role="alert"
                     aria-live="assertive">
                    <span id="loginAlertIcon" class="alert__icon"
                          aria-hidden="true">⚠</span>
                    <span id="loginAlertText"></span>
                </div>

                <!-- Username field -->
                <div class="form-group">
                    <label class="form-label" for="username">
                        Username
                    </label>
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">
                            <svg width="16" height="16"
                                 viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor"
                                 stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4
                                         0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                        <input type="text"
                               id="username"
                               name="username"
                               class="form-input"
                               placeholder="Enter username"
                               autocomplete="username"
                               autocapitalize="none"
                               autocorrect="off"
                               spellcheck="false"
                               maxlength="32"
                               required
                               aria-required="true"
                               aria-describedby="usernameError">
                    </div>
                    <span id="usernameError"
                          class="form-error"
                          role="alert"></span>
                </div>

                <!-- Password field -->
                <div class="form-group">
                    <label class="form-label" for="password">
                        Password
                    </label>
                    <div class="input-wrapper">
                        <span class="input-icon" aria-hidden="true">
                            <svg width="16" height="16"
                                 viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor"
                                 stroke-width="2">
                                <rect x="3" y="11" width="18"
                                      height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-input"
                               placeholder="Enter password"
                               autocomplete="current-password"
                               maxlength="64"
                               required
                               aria-required="true"
                               aria-describedby="passwordError">
                        <button type="button"
                                class="input-toggle"
                                id="togglePassword"
                                aria-label="Toggle password visibility">
                            <svg id="eyeIcon"
                                 width="16" height="16"
                                 viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor"
                                 stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4
                                         8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <span id="passwordError"
                          class="form-error"
                          role="alert"></span>
                </div>

                <!-- Submit button -->
                <button type="submit"
                        id="loginBtn"
                        class="btn btn--primary btn--full"
                        aria-live="polite">
                    <span id="loginBtnText">Sign In</span>
                    <span id="loginBtnSpinner"
                          class="btn__spinner btn__spinner--hidden"
                          aria-hidden="true"></span>
                </button>

            </form>
        </div>

        <!-- Footer -->
        <footer class="auth-footer">
            <p>
                <span id="firmwareVersion"></span>
            </p>
        </footer>

    </div><!-- /.auth-container -->

    <!-- Scripts -->
    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>

</body>
</html>
